<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>VM 2026 Tipping — Stilling</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@400;600;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root {
  --ink: #0a0e1a;
  --cream: #f5f1e8;
  --paper: #fbfaf5;
  --accent: #ff4d2d;
  --accent-dim: #ff4d2d1a;
  --gold: #f59e0b;
  --silver: #94a3b8;
  --bronze: #b45309;
  --muted: #6b7280;
  --line: #e5e1d5;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Inter', -apple-system, sans-serif;
  background: var(--paper);
  color: var(--ink);
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}
.container { max-width: 1100px; margin: 0 auto; padding: 1.5rem 1.25rem 4rem; }

header { border-bottom: 2px solid var(--ink); padding-bottom: 1rem; margin-bottom: 1.5rem; }
.brand {
  font-family: 'Bricolage Grotesque', sans-serif;
  font-weight: 800;
  font-size: clamp(1.75rem, 5vw, 2.5rem);
  line-height: 0.95;
  letter-spacing: -0.03em;
}
.brand-accent { color: var(--accent); }
.nav {
  margin-top: 0.5rem;
  display: flex;
  gap: 1rem;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.75rem;
  text-transform: uppercase;
  letter-spacing: 0.1em;
}
.nav a { color: var(--muted); text-decoration: none; border-bottom: 2px solid transparent; padding-bottom: 2px; }
.nav a.active { color: var(--ink); border-bottom-color: var(--accent); }

/* Hero */
.hero {
  background: var(--ink);
  color: var(--cream);
  border-radius: 12px;
  padding: 2rem 1.5rem;
  margin-bottom: 1.5rem;
}
.hero-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.6875rem;
  letter-spacing: 0.2em;
  opacity: 0.6;
  margin-bottom: 0.5rem;
}
.hero-leader {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 1rem;
}
.hero-name {
  font-family: 'Bricolage Grotesque', sans-serif;
  font-size: clamp(1.5rem, 5vw, 2.5rem);
  font-weight: 800;
  letter-spacing: -0.02em;
}
.hero-score {
  font-family: 'JetBrains Mono', monospace;
  font-weight: 700;
  font-size: clamp(2rem, 6vw, 3rem);
  color: var(--accent);
}
.hero-sub {
  opacity: 0.7;
  font-size: 0.875rem;
  margin-top: 0.25rem;
}

/* Controls */
.controls {
  display: flex;
  gap: 0.5rem;
  margin-bottom: 1rem;
  flex-wrap: wrap;
}
.search {
  flex: 1 1 240px;
  padding: 0.625rem 0.875rem;
  border: 1.5px solid var(--line);
  border-radius: 6px;
  font-size: 0.9375rem;
  font-family: inherit;
  background: white;
}
.search:focus { outline: none; border-color: var(--ink); }
.filter {
  padding: 0.625rem 0.875rem;
  border: 1.5px solid var(--line);
  border-radius: 6px;
  background: white;
  font-family: inherit;
  font-size: 0.9375rem;
}
.tabs { display: flex; gap: 2px; background: var(--line); padding: 2px; border-radius: 6px; }
.tab {
  padding: 0.5rem 0.875rem;
  border: none;
  background: transparent;
  font-family: inherit;
  font-size: 0.8125rem;
  font-weight: 600;
  cursor: pointer;
  border-radius: 4px;
  color: var(--muted);
}
.tab.active { background: white; color: var(--ink); }

/* Table */
.lb-wrap { background: white; border: 1.5px solid var(--line); border-radius: 8px; overflow: hidden; }
.lb-table { width: 100%; border-collapse: collapse; font-size: 0.875rem; }
.lb-table th {
  text-align: left;
  padding: 0.625rem 0.75rem;
  background: var(--paper);
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.6875rem;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--muted);
  border-bottom: 1px solid var(--line);
  position: sticky; top: 0; z-index: 5;
}
.lb-table th.num, .lb-table td.num {
  text-align: right;
  font-family: 'JetBrains Mono', monospace;
  font-weight: 700;
}
.lb-table td {
  padding: 0.625rem 0.75rem;
  border-bottom: 1px solid var(--line);
  vertical-align: middle;
}
.lb-table tr:hover { background: var(--paper); cursor: pointer; }
.rank {
  font-family: 'JetBrains Mono', monospace;
  font-weight: 700;
  width: 32px;
  color: var(--muted);
}
.rank.r1 { color: var(--gold); }
.rank.r2 { color: var(--silver); }
.rank.r3 { color: var(--bronze); }
.participant-name { font-weight: 600; }
.participant-meta { font-size: 0.75rem; color: var(--muted); }
.total-pts {
  font-family: 'JetBrains Mono', monospace;
  font-weight: 700;
  font-size: 1rem;
}
.delta-up { color: #22c55e; }
.delta-down { color: #ef4444; }

/* Charts */
.charts-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1rem;
  margin-top: 1.5rem;
}
@media (max-width: 640px) { .charts-grid { grid-template-columns: 1fr; } }
.chart-card {
  background: white;
  border: 1.5px solid var(--line);
  border-radius: 8px;
  padding: 1rem;
}
.chart-title {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.6875rem;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--muted);
  margin-bottom: 0.75rem;
}

/* Modal */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(10,14,26,0.6);
  display: none;
  align-items: center;
  justify-content: center;
  padding: 1rem;
  z-index: 100;
}
.modal-overlay.open { display: flex; }
.modal {
  background: var(--paper);
  border-radius: 12px;
  max-width: 560px;
  width: 100%;
  max-height: 90vh;
  overflow-y: auto;
  padding: 1.5rem;
}
.modal h3 {
  font-family: 'Bricolage Grotesque', sans-serif;
  font-size: 1.5rem;
  margin-bottom: 0.25rem;
}
.score-breakdown {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
  gap: 0.5rem;
  margin-top: 1rem;
}
.score-cell {
  background: white;
  border: 1px solid var(--line);
  border-radius: 6px;
  padding: 0.5rem;
  text-align: center;
}
.score-cell .label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.625rem;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--muted);
}
.score-cell .val { font-family: 'JetBrains Mono', monospace; font-weight: 700; font-size: 1.125rem; }

.empty-state {
  padding: 3rem 1rem;
  text-align: center;
  color: var(--muted);
}
.loading {
  display: inline-block;
  width: 16px; height: 16px;
  border: 2px solid var(--ink);
  border-top-color: transparent;
  border-radius: 50%;
  animation: spin 0.6s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="brand">VM<span class="brand-accent">26</span> · Stilling</div>
    <div class="nav">
      <a href="index.html">Registrering</a>
      <a href="report.html" class="active">Stilling</a>
    </div>
  </header>

  <div class="hero" id="hero">
    <div class="hero-label">FØRENDE</div>
    <div class="hero-leader">
      <div>
        <div class="hero-name" id="leader-name">—</div>
        <div class="hero-sub" id="leader-meta"></div>
      </div>
      <div>
        <div class="hero-score" id="leader-score">—</div>
        <div class="hero-sub" id="generated-at" style="text-align:right;"></div>
      </div>
    </div>
  </div>

  <div class="controls">
    <input type="text" class="search" id="search" placeholder="🔍 Søk navn…">
    <select class="filter" id="filter-company"><option value="">Alle firma</option></select>
    <select class="filter" id="filter-dept"><option value="">Alle avdelinger</option></select>
    <div class="tabs">
      <button class="tab active" data-view="total">Total</button>
      <button class="tab" data-view="no_extras">Uten extras</button>
    </div>
  </div>

  <div class="lb-wrap">
    <table class="lb-table" id="lb-table">
      <thead>
        <tr>
          <th>#</th><th>Deltaker</th>
          <th class="num">Gruppe</th>
          <th class="num">Ko</th>
          <th class="num">Extras</th>
          <th class="num">Total</th>
        </tr>
      </thead>
      <tbody id="lb-body">
        <tr><td colspan="6" class="empty-state"><span class="loading"></span> Laster stilling…</td></tr>
      </tbody>
    </table>
  </div>

  <div class="charts-grid">
    <div class="chart-card">
      <div class="chart-title">Topp 5 — Poengutvikling</div>
      <canvas id="chart-distribution" height="200"></canvas>
    </div>
    <div class="chart-card">
      <div class="chart-title">Poeng etter kategori — Top 10</div>
      <canvas id="chart-categories" height="200"></canvas>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal" onclick="if(event.target===this) closeModal()">
  <div class="modal" id="modal-content"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="config.js"></script>
<script>initSupabase();</script>
<script src="report.js"></script>
</body>
</html>
